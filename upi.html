<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment</title>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: black;
    color: white;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  h1 {
    font-size: 36px;
    margin-bottom: 20px;
  }

  .container {
    background-color: black;
    padding: 30px;
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
  }

  .container p {
    font-size: 18px;
    margin-bottom: 20px;
  }

  .pay-button {
    background-color: #04AA6D;
    color: white;
    padding: 15px 30px;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
    transition: background-color 0.3s ease;
  }

  .pay-button:hover {
    background-color: #45a049;
  }

  @media (max-width: 768px) {
    .container {
      padding: 20px;
    }

    h1 {
      font-size: 30px;
    }

    .pay-button {
      font-size: 16px;
      padding: 12px 24px;
    }
  }

  @media (max-width: 480px) {
    h1 {
      font-size: 24px;
    }

    .pay-button {
      font-size: 14px;
      padding: 10px 20px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>Pay via UPI</h1>
  <p>Click below to pay ₹999 via UPI:</p>
  <br>
  <a href="upi://pay?pa=9177443441@ybl&am=999&cu=INR&tn=Payment%20for%20chicken%20pickle&url=https://chicken-pickle-igjvb.kinsta.page/payment-status?status=" class="pay-button" style="text-decoration: none;">Pay Now</a>
  <br>
  <br>
</div>

</body>

<script src="script.js">
   
  </script>
  
</html>
