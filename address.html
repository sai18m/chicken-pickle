<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>address</title>
<style>
body {font-family: Arial, Helvetica, sans-serif;}
* {box-sizing: border-box; background-color: black; color: white;}

input[type=text], input[type=number], input[type=email], select, textarea {
  width: 100%;
  padding: 12px;
  border: 2px solid rgb(54, 52, 52);
  border-radius: 4px;
  box-sizing: border-box;
  margin-top: 6px;
  margin-bottom: 16px;
  resize: vertical;
}

input[type=submit] {
  background-color: #04AA6D;
  color: white;
  padding: 12px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  display: block;
  margin: 20px auto;
  width: 50%;
}

input[type=submit]:hover {
  background-color: #45a049;
}

.container {
  border-radius: 5px;
  background-color: none;
  padding: 20px;
}
</style>
</head>
<body>

<h3 style="text-align: center;">Address</h3>

<div class="container">
  <form id="addressForm" action="javascript:void(0)" method="POST" onsubmit="submitForm(event)">
    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" placeholder="Your full name.." required>

    <label for="number">Phone Number</label>
    <input type="number" id="number" name="number" placeholder="Your phone number.." required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>


    <label for="house">House No.</label>
    <input type="text" id="house" name="house" placeholder="Your house number.." required>

    <label for="street">Street</label>
    <input type="text" id="street" name="street" placeholder="Your street.." required>

    <label for="city">City</label>
    <input type="text" id="city" name="city" placeholder="Your city.." required>

    <label for="state">State</label>
    <input type="text" id="state" name="state" placeholder="Your state.." required>

    <label for="pincode">Pincode</label>
    <input type="text" id="pincode" name="pincode" placeholder="Your pincode.." required>

    <input type="submit" value="Submit">
  </form>
</div>

<script src="script.js"></script>

</body>
</html>
